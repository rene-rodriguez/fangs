name: release

# Builds the Linux + macOS release tarballs and attaches them to the GitHub
# release for the pushed tag. Trigger by pushing a tag (git tag v0.1.0 &&
# git push origin v0.1.0) or manually via "Run workflow" with a tag input.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and upload (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  ZIG_VERSION: '0.15.2'

jobs:
  # Create the release once, up front, so the parallel build jobs only upload.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "Fangs $TAG" --generate-notes

  linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build patchelf \
            libcurl4-openssl-dev libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev libxinerama-dev
      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p "$HOME/zig" && tar -xf /tmp/zig.tar.xz -C "$HOME/zig" --strip-components=1
          echo "$HOME/zig" >> "$GITHUB_PATH"
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Package
        run: bash scripts/package-linux.sh "$TAG"
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" dist/fangs-linux-x86_64.tar.gz --repo "$GITHUB_REPOSITORY" --clobber

  macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (arm64)
          # macOS Intel (x86_64) dropped: GitHub is deprecating the macos-13
          # runner and the Intel-Mac audience is shrinking. Intel = build from source.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: Install build deps
        run: brew install cmake ninja
      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          case "$(uname -m)" in
            arm64)  z=aarch64 ;;
            x86_64) z=x86_64 ;;
          esac
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${z}-macos-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p "$HOME/zig" && tar -xf /tmp/zig.tar.xz -C "$HOME/zig" --strip-components=1
          echo "$HOME/zig" >> "$GITHUB_PATH"
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Package CLI tarball
        run: bash scripts/package-macos.sh "$TAG"
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Require macOS signing and notarization secrets
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          CODESIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in CERTIFICATE_BASE64 CERTIFICATE_PASSWORD CODESIGN_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for notarized macOS releases"
              missing=1
            fi
          done
          exit "$missing"
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/fangs-signing.keychain-db"
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            KEYCHAIN_PASSWORD="$(uuidgen)"
          fi

          echo "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      - name: Bundle .app (for the Homebrew cask)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          FANGS_CODESIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash scripts/macos-bundle.sh "${TAG#v}"   # cask version has no leading 'v'
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" \
            "dist/fangs-macos-$(uname -m).tar.gz" \
            "dist/fangs-${TAG#v}-macos-$(uname -m).zip" \
            --repo "$GITHUB_REPOSITORY" --clobber
